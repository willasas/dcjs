<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>dcCrypto 示例</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 20px;
      line-height: 1.6;
    }
    h1 {
      color: #333;
    }
    h2 {
      color: #555;
      margin-top: 30px;
    }
    .example {
      background: #f5f5f5;
      padding: 15px;
      margin: 10px 0;
      border-radius: 5px;
    }
    .input {
      margin: 10px 0;
    }
    .output {
      background: #e8f4f8;
      padding: 10px;
      margin: 10px 0;
      border-radius: 3px;
      font-family: monospace;
      word-break: break-all;
    }
    button {
      padding: 8px 16px;
      margin: 5px;
      background: #4CAF50;
      color: white;
      border: none;
      border-radius: 3px;
      cursor: pointer;
    }
    button:hover {
      background: #45a049;
    }
    input[type="text"] {
      padding: 8px;
      margin: 5px;
      border: 1px solid #ddd;
      border-radius: 3px;
      width: 300px;
    }
    input[type="number"] {
      padding: 8px;
      margin: 5px;
      border: 1px solid #ddd;
      border-radius: 3px;
      width: 100px;
    }
  </style>
</head>
<body>
  <h1>dcCrypto 示例</h1>

  <h2>1. MD5 加密</h2>
  <div class="example">
    <div class="input">
      <input type="text" id="md5Input" placeholder="输入要加密的文本">
      <button onclick="testMd5()">MD5加密</button>
    </div>
    <div class="output" id="md5Output"></div>
  </div>

  <h2>2. SHA-256 加密</h2>
  <div class="example">
    <div class="input">
      <input type="text" id="sha256Input" placeholder="输入要加密的文本">
      <button onclick="testSha256()">SHA-256加密</button>
    </div>
    <div class="output" id="sha256Output"></div>
  </div>

  <h2>3. Base64 编码/解码</h2>
  <div class="example">
    <div class="input">
      <input type="text" id="base64Input" placeholder="输入要编码/解码的文本">
      <button onclick="testBase64Encode()">Base64编码</button>
      <button onclick="testBase64Decode()">Base64解码</button>
    </div>
    <div class="output" id="base64Output"></div>
  </div>

  <h2>4. AES 加密/解密</h2>
  <div class="example">
    <div class="input">
      <input type="text" id="aesMessageInput" placeholder="输入要加密的消息">
      <input type="text" id="aesPasswordInput" placeholder="输入密码">
      <button onclick="testAesEncrypt()">AES加密</button>
      <button onclick="testAesDecrypt()">AES解密</button>
    </div>
    <div class="output" id="aesOutput"></div>
  </div>

  <h2>5. 随机密码生成</h2>
  <div class="example">
    <div class="input">
      <input type="number" id="passwordLengthInput" value="32" min="1" max="128">
      <button onclick="testGeneratePassword()">生成随机密码</button>
    </div>
    <div class="output" id="passwordOutput"></div>
  </div>

  <h2>6. 随机密钥生成</h2>
  <div class="example">
    <div class="input">
      <input type="number" id="keyLengthInput" value="32" min="1" max="128">
      <button onclick="testGenerateKey()">生成随机密钥</button>
    </div>
    <div class="output" id="keyOutput"></div>
  </div>

  <h2>7. UUID 生成</h2>
  <div class="example">
    <div class="input">
      <button onclick="testUuid()">生成UUID</button>
    </div>
    <div class="output" id="uuidOutput"></div>
  </div>

  <h2>8. HMAC-SHA256 签名</h2>
  <div class="example">
    <div class="input">
      <input type="text" id="hmacMessageInput" placeholder="输入要签名的消息">
      <input type="text" id="hmacKeyInput" placeholder="输入密钥">
      <button onclick="testHmacSha256()">生成HMAC签名</button>
    </div>
    <div class="output" id="hmacOutput"></div>
  </div>

  <h2>9. 安全随机数</h2>
  <div class="example">
    <div class="input">
      <input type="number" id="randomMinInput" value="1" min="0">
      <input type="number" id="randomMaxInput" value="100" min="1">
      <button onclick="testSecureRandom()">生成安全随机数</button>
    </div>
    <div class="output" id="randomOutput"></div>
  </div>

  <h2>10. 密码哈希与验证</h2>
  <div class="example">
    <div class="input">
      <input type="text" id="passwordHashInput" placeholder="输入密码">
      <button onclick="testHashPassword()">生成密码哈希</button>
      <button onclick="testVerifyPassword()">验证密码哈希</button>
    </div>
    <div class="output" id="passwordHashOutput"></div>
  </div>

  <script src="../../../dist/dc.iife.js"></script>
  <script>
    // 确保 DC.Crypto 可用
    const dcCrypto = window.DC ? window.DC.Crypto : require('../../../src/utils/dcCrypto');

    function setOutput(id, content) {
      document.getElementById(id).textContent = JSON.stringify(content, null, 2);
    }

    // 测试 MD5
    function testMd5() {
      const input = document.getElementById('md5Input').value;
      const result = dcCrypto.md5(input);
      document.getElementById('md5Output').textContent = result;
    }

    // 测试 SHA-256
    async function testSha256() {
      const input = document.getElementById('sha256Input').value;
      const result = await dcCrypto.sha256(input);
      document.getElementById('sha256Output').textContent = result;
    }

    // 测试 Base64 编码
    function testBase64Encode() {
      const input = document.getElementById('base64Input').value;
      const result = dcCrypto.base64Encode(input);
      document.getElementById('base64Output').textContent = result;
    }

    // 测试 Base64 解码
    function testBase64Decode() {
      const input = document.getElementById('base64Input').value;
      const result = dcCrypto.base64Decode(input);
      document.getElementById('base64Output').textContent = result;
    }

    // 测试 AES 加密
    async function testAesEncrypt() {
      const message = document.getElementById('aesMessageInput').value;
      const password = document.getElementById('aesPasswordInput').value;
      const result = await dcCrypto.aesEncrypt(message, password);
      document.getElementById('aesOutput').textContent = result;
    }

    // 测试 AES 解密
    async function testAesDecrypt() {
      const encrypted = document.getElementById('aesOutput').textContent;
      const password = document.getElementById('aesPasswordInput').value;
      const result = await dcCrypto.aesDecrypt(encrypted, password);
      document.getElementById('aesOutput').textContent = result;
    }

    // 测试生成随机密码
    function testGeneratePassword() {
      const length = parseInt(document.getElementById('passwordLengthInput').value);
      const result = dcCrypto.generatePassword(length);
      document.getElementById('passwordOutput').textContent = result;
    }

    // 测试生成随机密钥
    function testGenerateKey() {
      const length = parseInt(document.getElementById('keyLengthInput').value);
      const result = dcCrypto.generateKey(length);
      document.getElementById('keyOutput').textContent = result;
    }

    // 测试生成 UUID
    function testUuid() {
      const result = dcCrypto.uuid();
      document.getElementById('uuidOutput').textContent = result;
    }

    // 测试 HMAC-SHA256
    async function testHmacSha256() {
      const message = document.getElementById('hmacMessageInput').value;
      const key = document.getElementById('hmacKeyInput').value;
      const result = await dcCrypto.hmacSha256(message, key);
      document.getElementById('hmacOutput').textContent = result;
    }

    // 测试安全随机数
    function testSecureRandom() {
      const min = parseInt(document.getElementById('randomMinInput').value);
      const max = parseInt(document.getElementById('randomMaxInput').value);
      const result = dcCrypto.secureRandom(min, max);
      document.getElementById('randomOutput').textContent = result;
    }

    // 测试密码哈希
    async function testHashPassword() {
      const password = document.getElementById('passwordHashInput').value;
      const result = await dcCrypto.hashPassword(password);
      document.getElementById('passwordHashOutput').textContent = result;
    }

    // 测试验证密码哈希
    async function testVerifyPassword() {
      const password = document.getElementById('passwordHashInput').value;
      const hash = document.getElementById('passwordHashOutput').textContent;
      const result = await dcCrypto.verifyPassword(password, hash);
      document.getElementById('passwordHashOutput').textContent = `验证结果: ${result}`;
    }
  </script>
</body>
</html>
